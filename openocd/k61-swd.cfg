# OpenOCD config: Flipper Zero (DAP Link / CMSIS-DAP) -> Womier K61 (Sonix SN32F248F, Cortex-M0)
#
# We treat it as a bare Cortex-M0 and drive memory reads by hand (no SN32 flash
# driver in OpenOCD). Used by scripts/swd-connect.sh and scripts/swd-dump.sh.

adapter driver cmsis-dap
transport select swd

# Flying leads over a breadboard-ish setup: keep SWD slow & reliable.
adapter speed 400

set _CHIPNAME sn32
swd newdap $_CHIPNAME cpu -enable
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu
target create $_CHIPNAME.cpu cortex_m -dap $_CHIPNAME.dap

# No reset wire connected (we only solder SWDIO/SWCLK/GND/BOOT), so no SRST.
reset_config none separate
